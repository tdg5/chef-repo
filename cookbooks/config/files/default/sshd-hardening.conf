# Managed by Chef (config::sshd). Key-based SSH only; no password logins.
#
# Ubuntu's sshd reads /etc/ssh/sshd_config.d/*.conf in alphabetical order and
# the FIRST value seen for a keyword wins. Cloud images ship a
# 50-cloud-init.conf that sets `PasswordAuthentication yes`, so this file uses a
# `00-` prefix to be read first and take precedence.
PasswordAuthentication no
# Without this, PAM keyboard-interactive auth can still accept passwords.
KbdInteractiveAuthentication no
